name: odoo

services:
  wp.devlab.info.vn:
    container_name: wp.devlab.info.vn
    image: wordpress:6.5.4
    environment:
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
    volumes:
      - wordpress_data:/var/www/html
      - ./wordpress/wp-content:/var/www/html/wp-content
    ports:
      - "8080:80"
    networks:
      - backup.dhthainguyen.edu.vn
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  app.devlab.info.vn:
    build: ./backup.dhthainguyen.edu.vn
    container_name: app.devlab.info.vn
    user: "1000:1000"
    environment:
      DB_HOST: ${DB_HOST}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3000:3000"
    networks:
      - backup.dhthainguyen.edu.vn
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:5.6
    container_name: mysql.devlab.info.vn
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${WORDPRESS_DB_USER}
      MYSQL_PASSWORD: ${WORDPRESS_DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sh:/docker-entrypoint-initdb.d/init.sh
    networks:
      - backup.dhthainguyen.edu.vn
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  odoo:
    image: odoo:17.0
    container_name: odoo.devlab.info.vn
    environment:
      HOST: postgres.devlab.info.vn
      USER: ${ODOO_DB_USER}
      PASSWORD: ${ODOO_DB_PASSWORD}
    volumes:
      - odoo_data:/var/lib/odoo
      - ./odoo/config:/etc/odoo
      - ./odoo/addons:/mnt/extra-addons
    ports:
      - "8069:8069"
    networks:
      - backup.dhthainguyen.edu.vn
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8069/web/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: postgres.devlab.info.vn
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${ODOO_DB_USER}
      POSTGRES_PASSWORD: ${ODOO_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backup.dhthainguyen.edu.vn
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ODOO_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  backup.dhthainguyen.edu.vn:
    driver: bridge

volumes:
  wordpress_data:
  mysql_data:
  odoo_data:
  postgres_data:
